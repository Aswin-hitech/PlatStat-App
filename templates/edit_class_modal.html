<!-- templates/edit_class_modal.html -->
<div id="editClassModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">
  <div class="modal-content" style="background:#1e1e2f;padding:20px;border-radius:10px;max-width:600px;width:90%;">
    <h2>Edit Class</h2>
    <form id="editClassForm">
      <input type="hidden" name="classId" id="editClassId" />
      <div class="form-group">
        <label for="editClassName">Class Name <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="editClassName" name="className" placeholder="e.g., AIML 3rd Year" required />
      </div>
      <div class="form-group">
        <label for="editAcademicYear">Academic Year <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="editAcademicYear" name="academicYear" placeholder="e.g., 3rd Year" required />
      </div>
      <div class="form-group">
        <label for="editDepartment">Department <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="editDepartment" name="department" placeholder="e.g., Computer Science" required />
      </div>
      <div class="form-group">
        <label for="editCollege">College <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="editCollege" name="college" placeholder="e.g., NPIT" required />
      </div>
      <div class="form-group">
        <label for="editSection">Section (optional)</label>
        <input type="text" id="editSection" name="section" placeholder="e.g., A" />
      </div>
      <div class="form-group">
        <label for="editDescription">Description (optional)</label>
        <textarea id="editDescription" name="description" placeholder="Brief description of the class" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="editCreatedBy">Created By (optional)</label>
        <input type="text" id="editCreatedBy" name="createdBy" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label for="editAcademicBatch">Academic Batch (optional)</label>
        <input type="text" id="editAcademicBatch" name="academicBatch" placeholder="e.g., 2023-2024" />
      </div>
      <div style="margin-top:15px;display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="ghost-button" onclick="closeEditClassModal()">Cancel</button>
        <button type="submit" class="primary-button">Save</button>
      </div>
    </form>
  </div>
</div>
