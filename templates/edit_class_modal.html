<!-- templates/edit_class_modal.html -->
<div id="editClassModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">
  <div class="modal-content" style="background:#1e1e2f;padding:20px;border-radius:10px;max-width:600px;width:90%;">
    <h2>Edit Class</h2>
    <form id="editClassForm">
      <input type="hidden" name="classId" id="editClassId" />
      <label>Class Name*:<br><input type="text" name="className" id="editClassName" required></label><br>
      <label>Academic Year*:<br><input type="text" name="academicYear" id="editAcademicYear" required></label><br>
      <label>Department*:<br><input type="text" name="department" id="editDepartment" required></label><br>
      <label>College*:<br><input type="text" name="college" id="editCollege" required></label><br>
      <label>Section:<br><input type="text" name="section" id="editSection"></label><br>
      <label>Description:<br><textarea name="description" id="editDescription"></textarea></label><br>
      <label>Created By:<br><input type="text" name="createdBy" id="editCreatedBy"></label><br>
      <label>Academic Batch:<br><input type="text" name="academicBatch" id="editAcademicBatch"></label><br>
      <div style="margin-top:15px;">
        <button type="button" class="ghost-button" onclick="closeEditClassModal()">Cancel</button>
        <button type="submit" class="primary-button">Save</button>
      </div>
    </form>
  </div>
</div>
