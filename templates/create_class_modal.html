<!-- templates/create_class_modal.html -->
<div id="createClassModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">
  <div class="modal-content" style="background:#1e1e2f;padding:20px;border-radius:10px;max-width:600px;width:90%;">
    <h2>Create New Class</h2>
    <form id="createClassForm">
      <div class="form-group">
        <label for="className">Class Name <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="className" name="className" placeholder="e.g., AIML 3rd Year" required />
      </div>
      <div class="form-group">
        <label for="academicYear">Academic Year <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="academicYear" name="academicYear" placeholder="e.g., 3rd Year" required />
      </div>
      <div class="form-group">
        <label for="department">Department <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="department" name="department" placeholder="e.g., Computer Science" required />
      </div>
      <div class="form-group">
        <label for="college">College <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="college" name="college" placeholder="e.g., NPIT" required />
      </div>
      <div class="form-group">
        <label for="section">Section (optional)</label>
        <input type="text" id="section" name="section" placeholder="e.g., A" />
      </div>
      <div class="form-group">
        <label for="description">Description (optional)</label>
        <textarea id="description" name="description" placeholder="Brief description of the class" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="createdBy">Created By (optional)</label>
        <input type="text" id="createdBy" name="createdBy" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label for="academicBatch">Academic Batch (optional)</label>
        <input type="text" id="academicBatch" name="academicBatch" placeholder="e.g., 2023-2024" />
      </div>
      <div style="margin-top:15px;display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="ghost-button" onclick="closeCreateClassModal()">Cancel</button>
        <button type="submit" class="primary-button">Create</button>
      </div>
    </form>
  </div>
</div>
